name: Refresh outage data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CMP outage data
        run: ./scripts/fetch-outages.sh

      - name: Commit if changed
        run: |
          git config user.name "outage-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/outages.json
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "Update outage data"
          git push
